<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocsFlow - 自託管 Word 線上編輯器</title>
    <!-- Google Fonts: Inter and Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Local stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Self-hosted TinyMCE JavaScript -->
    <script src="tinymce/tinymce.min.js" referrerpolicy="origin"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="18" height="18" rx="4" fill="url(#logo-grad)" />
                        <path d="M7 8H17M7 12H17M7 16H13" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="logo-grad" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#7C3AED" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="logo-text">DocsFlow</span>
                </div>
                <div class="divider"></div>
                <div class="document-info">
                    <input type="text" id="doc-title" value="未命名文件" placeholder="請輸入文件名稱..." title="按一下以編輯名稱" />
                    <span id="save-status" class="status-badge">
                        <span class="status-dot"></span>
                        <span class="status-text">已載入</span>
                    </span>
                </div>
            </div>
            <div class="header-right">
                <div class="layout-toggle" title="切換編輯版面">
                    <button id="btn-layout-page" class="layout-btn active">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="4" y="2" width="16" height="20" rx="2" />
                            <line x1="8" y1="6" x2="16" y2="6" />
                            <line x1="8" y1="10" x2="16" y2="10" />
                            <line x1="8" y1="14" x2="12" y2="14" />
                        </svg>
                        A4 頁面
                    </button>
                    <button id="btn-layout-fluid" class="layout-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <line x1="6" y1="9" x2="18" y2="9" />
                            <line x1="6" y1="15" x2="14" y2="15" />
                        </svg>
                        寬版流動
                    </button>
                </div>
                
                <!-- Split-Button Dropdown for Saving/Exporting -->
                <div class="dropdown-wrapper">
                    <div class="btn-group">
                        <button id="btn-save" class="btn btn-primary btn-split-main">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                                <polyline points="17 21 17 13 7 13 7 21" />
                                <polyline points="7 3 7 8 15 8" />
                            </svg>
                            儲存文件
                        </button>
                        <button id="btn-dropdown-toggle" class="btn btn-primary btn-split-arrow" title="選擇匯出格式">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                    </div>
                    <div id="save-dropdown-menu" class="dropdown-menu">
                        <button id="export-html" class="dropdown-item">
                            <span class="item-icon">💾</span>
                            <div class="item-body">
                                <span class="item-title">儲存 HTML 格式</span>
                                <span class="item-desc">存至伺服器或下載備份</span>
                            </div>
                        </button>
                        <button id="export-word" class="dropdown-item">
                            <span class="item-icon">📝</span>
                            <div class="item-body">
                                <span class="item-title">匯出 Word 文件 (.doc)</span>
                                <span class="item-desc">轉存為相容 MS Word 格式</span>
                            </div>
                        </button>
                        <button id="export-pdf" class="dropdown-item">
                            <span class="item-icon">📕</span>
                            <div class="item-body">
                                <span class="item-title">匯出 PDF 文件 (.pdf)</span>
                                <span class="item-desc">透過瀏覽器列印為 PDF</span>
                            </div>
                        </button>
                        <button id="export-txt" class="dropdown-item">
                            <span class="item-icon">📋</span>
                            <div class="item-body">
                                <span class="item-title">匯出 純文字檔 (.txt)</span>
                                <span class="item-desc">僅取出內文，無任何格式</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Workspace Area -->
        <main class="app-workspace">
            <!-- Sidebar: Templates & Tools -->
            <aside class="app-sidebar">
                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>文件範本庫</h3>
                        <span class="badge" id="template-count">0</span>
                    </div>
                    <p class="section-desc">選擇一個預設範本載入到編輯器中開始撰寫。</p>
                    <div id="templates-list" class="templates-grid">
                        <div class="loading-skeleton">
                            <div class="skeleton-item"></div>
                            <div class="skeleton-item"></div>
                            <div class="skeleton-item"></div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section info-section">
                    <h3>系統資訊</h3>
                    <div class="info-card">
                        <div class="info-row">
                            <span class="info-label">編輯器版本:</span>
                            <span class="info-value">TinyMCE v7 (自託管)</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">連線狀態:</span>
                            <span class="info-value text-success">在線 (本地伺服器)</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">儲存格式:</span>
                            <span class="info-value">標準 HTML5 / Word 相容</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Editor Container -->
            <section class="editor-workspace" id="editor-workspace-container">
                <div class="editor-wrapper layout-page-view" id="editor-wrapper">
                    <!-- The actual textarea TinyMCE will bind to -->
                    <textarea id="tinymce-editor">
                        <h1 style="text-align: center;">歡迎使用 DocsFlow 文件編輯器！</h1>
                        <p style="text-align: center; color: #666;">這是一個基於 TinyMCE 7 建立的自託管 Word 文件線上編輯與測試平台。</p>
                        <hr />
                        <h3>💡 測試指南與功能特色：</h3>
                        <ol>
                            <li><strong>直接編輯：</strong> 你可以像在 Microsoft Word 中一樣，直接在這個區域修改文字、套用粗體/斜體、改變字體顏色。</li>
                            <li><strong>版面切換：</strong> 點擊右上角的「A4 頁面」或「寬版流動」按鈕，可以即時切換不同的編輯視覺感受。</li>
                            <li><strong>範本載入：</strong> 在左側的「文件範本庫」中，點擊任何一個範本（例如週報、會議記錄），即可快速載入對應格式。</li>
                            <li><strong>儲存測試：</strong> 點擊右上角「儲存文件」按鈕，編輯器內容將即時寫入後端伺服器的 <code>saved_documents/</code> 目錄中。</li>
                        </ol>
                        <p>&nbsp;</p>
                        <table style="border-collapse: collapse; width: 100%; border-color: #e2e8f0; border-style: solid;" border="1">
                            <thead>
                                <tr style="background-color: #f8fafc;">
                                    <th style="width: 30%; padding: 8px;">測試項目</th>
                                    <th style="width: 40%; padding: 8px;">功能說明</th>
                                    <th style="width: 30%; padding: 8px;">測試狀態</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="padding: 8px;">富文本編輯 (WYSIWYG)</td>
                                    <td style="padding: 8px;">文字格式、段落對齊、表格、連結插入</td>
                                    <td style="padding: 8px; color: #10b981; font-weight: bold;">✓ 正常運作</td>
                                </tr>
                                <tr>
                                    <td style="padding: 8px;">範本庫載入</td>
                                    <td style="padding: 8px;">動態從後端 API 讀取並渲染 HTML 樣板</td>
                                    <td style="padding: 8px; color: #f59e0b; font-weight: bold;">⚡ 等待測試</td>
                                </tr>
                                <tr>
                                    <td style="padding: 8px;">伺服器儲存</td>
                                    <td style="padding: 8px;">將編輯內容傳送到 Node.js API 存檔</td>
                                    <td style="padding: 8px; color: #f59e0b; font-weight: bold;">⚡ 等待測試</td>
                                </tr>
                            </tbody>
                        </table>
                        <p>&nbsp;</p>
                        <p style="text-align: right;"><strong>DocsFlow 開發團隊 敬上</strong></p>
                    </textarea>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast System -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Main Frontend Script -->
    <script src="js/app.js"></script>
</body>
</html>
